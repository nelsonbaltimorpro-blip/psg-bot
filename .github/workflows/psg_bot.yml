name: PSG Watch Party Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 -q

      - name: Check billetterie PSG Watch Party
        run: |
          python - <<'EOF'
          import smtplib, os, hashlib, json, re
          from datetime import datetime, timezone
          import requests
          from bs4 import BeautifulSoup
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart

          GMAIL = "nelson.baltimor.pro@gmail.com"
          PASSWORD = os.environ["GMAIL_APP_PASSWORD"]
          WORKER = "https://late-credit-b4e0.nelson-baltimor-pro.workers.dev/?url="

          HEADERS = {
            "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
            "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8",
            "Accept-Language": "fr-FR,fr;q=0.9,en;q=0.8",
            "Accept-Encoding": "gzip, deflate, br",
            "Connection": "keep-alive",
            "Upgrade-Insecure-Requests": "1",
          }

          TARGETS = [
            {"name": "Catalogue achat diffusion UCL",
             "url": WORKER + "https://billetterie.psg.fr/fr/catalogue/match-foot-masculin-diffusion-de-la-finale-ucl-2026"},
            {"name": "TicketPlace PSG",
             "url": WORKER + "https://ticketplace.psg.fr/fr/"},
          ]

          os.makedirs("keywords_state", exist_ok=True)

          # ============================================================
          # DÉTECTE SI LA PAGE EST UNE FILE D'ATTENTE OU UNE ERREUR
          # ============================================================

          def est_page_invalide(html, url_finale):
            # File d'attente Queue-it
            if "waitingroom.psg.fr" in url_finale:
              return True, "FILE D'ATTENTE ACTIVE (Queue-it)"
            if "waitingroom.psg.fr" in html:
              return True, "FILE D'ATTENTE ACTIVE (Queue-it)"
            if "queueittoken" in html.lower():
              return True, "FILE D'ATTENTE ACTIVE (Queue-it token)"
            if "too many redirects" in html.lower():
              return True, "ERREUR REDIRECTIONS"
            if "erreur" in html.lower() and len(html) < 500:
              return True, "ERREUR PAGE COURTE"
            # Page vide ou trop courte pour être réelle
            if len(html.strip()) < 200:
              return True, "PAGE TROP COURTE"
            return False, ""

          # ============================================================
          # EXTRACTION ZONE OFFRES — nettoie les éléments dynamiques
          # ============================================================

          def extraire_zone_offres(html):
            soup = BeautifulSoup(html, "html.parser")
            for tag in soup.find_all(["script", "style", "noscript", "iframe"]):
              tag.decompose()
            for tag in soup.find_all(attrs={"class": re.compile(r"nav|header|footer|menu|cookie|banner|social", re.I)}):
              tag.decompose()

            text = soup.get_text(separator="\n")

            # Supprime les tokens dynamiques, timestamps, UUIDs
            text = re.sub(r'eyJ[A-Za-z0-9+/=._-]{20,}', '', text)
            text = re.sub(r'[a-f0-9]{32,}', '', text)
            text = re.sub(r'\d{13}', '', text)  # timestamps ms
            text = re.sub(r'queueittoken=[^\s&"]+', '', text)
            text = re.sub(r'enqueuetoken=[^\s&"]+', '', text)
            text = re.sub(r'https?://[^\s]+', '', text)  # URLs complètes

            lignes = text.split("\n")
            lignes_nettoyees = []
            capture = False
            stops = ["accueil", "nike", "qatar airways", "beyond", "visit qatar", "ooredoo", "copyright"]

            for ligne in lignes:
              l = ligne.strip()
              if not l or len(l) < 2:
                continue
              if not capture and re.search(r"billet|offre|vente|diffusion|hospitalit", l, re.I):
                capture = True
              if capture:
                if any(s in l.lower() for s in stops):
                  break
                lignes_nettoyees.append(l)

            return "\n".join(lignes_nettoyees)

          def extraire_prix(zone):
            m = re.search(r"(\d+[,\.]\d+\s*€)", zone)
            return m.group(1).strip() if m else ""

          def extraire_categories(zone):
            m = re.search(r"ventes?\s+ouvertes?\s+pour\s*:?\s*(.*?)(?:acheter|voir toutes)", zone, re.IGNORECASE | re.DOTALL)
            if not m:
              return []
            bloc = m.group(1)
            lignes = [l.strip() for l in bloc.split("\n") if l.strip() and len(l.strip()) > 2]
            return lignes

          # ============================================================
          # CHECK
          # ============================================================

          def check_page(html, url_finale, t):
            state_filename = "keywords_state/" + hashlib.md5(t["url"].encode()).hexdigest() + ".json"

            # Charge l'état précédent
            state = {}
            if os.path.exists(state_filename):
              try:
                with open(state_filename, "r") as f:
                  state = json.load(f)
              except:
                state = {}

            hash_precedent = state.get("hash", "")
            zone_precedente = state.get("zone", "")
            premier_scan = not hash_precedent
            nb_files_attente = state.get("nb_files_attente", 0)

            # Vérifie si page invalide
            invalide, raison = est_page_invalide(html, url_finale)
            if invalide:
              nb_files_attente += 1
              with open(state_filename, "w") as f:
                json.dump({
                  "hash": hash_precedent,
                  "zone": zone_precedente,
                  "nb_files_attente": nb_files_attente,
                }, f)
              print(f"  Page invalide ({raison}) — conserve état précédent — {nb_files_attente}x")
              return None

            # Page valide — extrait la zone offres
            zone_actuelle = extraire_zone_offres(html)
            hash_actuel = hashlib.md5(zone_actuelle.encode("utf-8")).hexdigest()

            # Sauvegarde
            with open(state_filename, "w") as f:
              json.dump({
                "hash": hash_actuel,
                "zone": zone_actuelle,
                "nb_files_attente": 0,
              }, f)

            if premier_scan:
              print(f"  Premier scan enregistre — {len(zone_actuelle)} chars")
              return None

            if not zone_actuelle.strip():
              print(f"  Zone vide après nettoyage — skip")
              return None

            if hash_actuel != hash_precedent:
              lignes_avant = set(zone_precedente.split("\n"))
              lignes_apres = set(zone_actuelle.split("\n"))
              ajoutees = sorted([l for l in lignes_apres - lignes_avant if l.strip() and len(l.strip()) > 3])
              supprimees = sorted([l for l in lignes_avant - lignes_apres if l.strip() and len(l.strip()) > 3])
              cats_avant = extraire_categories(zone_precedente)
              cats_apres = extraire_categories(zone_actuelle)
              prix_avant = extraire_prix(zone_precedente)
              prix_apres = extraire_prix(zone_actuelle)

              return {
                "zone_avant": zone_precedente,
                "zone_apres": zone_actuelle,
                "lignes_ajoutees": ajoutees,
                "lignes_supprimees": supprimees,
                "cats_avant": cats_avant,
                "cats_apres": cats_apres,
                "prix_avant": prix_avant,
                "prix_apres": prix_apres,
              }

            return None

          # ============================================================
          # SCAN
          # ============================================================

          alerts = []
          heure = datetime.now(timezone.utc).strftime("%d/%m/%Y %H:%M UTC")

          for t in TARGETS:
            try:
              r = requests.get(t["url"], headers=HEADERS, timeout=25, allow_redirects=True)
              url_finale = r.url
              print(f"Scan — {t['name']} — {len(r.text)} chars — URL finale: {url_finale[:80]}")
              result = check_page(r.text, url_finale, t)
              if result:
                alerts.append({"target": t, "result": result})
                print(f"ALERTE CHANGEMENT — {t['name']}")
              else:
                print(f"OK — {t['name']} — pas de changement")
            except Exception as e:
              print(f"Erreur {t['name']}: {e}")

          # ============================================================
          # EMAIL
          # ============================================================

          if alerts:
            for a in alerts:
              t = a["target"]
              res = a["result"]

              cats_avant = res["cats_avant"]
              cats_apres = res["cats_apres"]
              ajoutees = res["lignes_ajoutees"]
              supprimees = res["lignes_supprimees"]
              prix_avant = res["prix_avant"]
              prix_apres = res["prix_apres"]
              prix_change = prix_avant and prix_apres and prix_avant != prix_apres

              nouvelles_cats = [c for c in cats_apres if c not in cats_avant]
              cats_disparues = [c for c in cats_avant if c not in cats_apres]

              if nouvelles_cats:
                subject = "PSG WATCH PARTY — NOUVELLE VAGUE OUVERTE ! FONCE !"
              elif prix_change:
                subject = "PSG WATCH PARTY — CHANGEMENT DE PRIX !"
              else:
                subject = "PSG WATCH PARTY — CHANGEMENT DETECTE SUR LA PAGE !"

              body = ""
              body += "=" * 50 + "\n"
              body += "  PSG WATCH PARTY — CHANGEMENT DETECTE\n"
              body += "=" * 50 + "\n\n"
              body += f"HEURE     : {heure}\n"
              body += f"PAGE      : {t['name']}\n\n"
              body += "=== LIENS ===\n"
              body += "ACHAT     : https://billetterie.psg.fr/fr/catalogue/match-foot-masculin-diffusion-de-la-finale-ucl-2026\n"
              body += "TICKETPLACE: https://ticketplace.psg.fr/fr/\n\n"

              body += "-" * 50 + "\n"
              body += "  RESUME\n"
              body += "-" * 50 + "\n\n"

              if nouvelles_cats:
                body += "NOUVELLES CATEGORIES OUVERTES :\n"
                for c in nouvelles_cats:
                  body += f"  >>> {c} <<<\n"
                body += "\n"

              if cats_disparues:
                body += "CATEGORIES FERMEES :\n"
                for c in cats_disparues:
                  body += f"  --- {c}\n"
                body += "\n"

              if prix_change:
                body += f"PRIX : {prix_avant} -> {prix_apres}\n\n"
              elif prix_apres:
                body += f"PRIX : {prix_apres} (inchange)\n\n"

              if cats_avant or cats_apres:
                body += "-" * 50 + "\n"
                body += "  VENTES OUVERTES POUR\n"
                body += "-" * 50 + "\n\n"
                body += "AVANT :\n"
                for c in cats_avant:
                  body += f"  • {c}\n"
                if not cats_avant:
                  body += "  (aucune)\n"
                body += "\nAPRES :\n"
                for c in cats_apres:
                  body += f"  • {c}\n"
                if not cats_apres:
                  body += "  (aucune)\n"
                body += "\n"

              if ajoutees or supprimees:
                body += "-" * 50 + "\n"
                body += "  TOUTES LES MODIFICATIONS\n"
                body += "-" * 50 + "\n\n"
                if ajoutees:
                  body += "LIGNES APPARUES :\n"
                  for l in ajoutees[:30]:
                    body += f"  + {l}\n"
                  body += "\n"
                if supprimees:
                  body += "LIGNES DISPARUES :\n"
                  for l in supprimees[:30]:
                    body += f"  - {l}\n"
                  body += "\n"

              body += "-" * 50 + "\n"
              body += "  CONTENU COMPLET\n"
              body += "-" * 50 + "\n\n"
              body += "--- AVANT ---\n"
              body += (res["zone_avant"] or "(vide)")[:2000]
              body += "\n\n--- APRES ---\n"
              body += (res["zone_apres"] or "(vide)")[:2000]
              body += "\n"

              msg = MIMEMultipart()
              msg["From"] = GMAIL
              msg["To"] = GMAIL
              msg["Subject"] = subject
              msg.attach(MIMEText(body, "plain", "utf-8"))
              try:
                with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
                  s.login(GMAIL, PASSWORD)
                  s.send_message(msg)
                print(f"Email envoye — {subject}")
              except Exception as e:
                print(f"Erreur email : {e}")
          else:
            print("Aucun changement detecte.")
          EOF
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Commit state
        run: |
          git config user.name "psg-bot"
          git config user.email "bot@noreply.github.com"
          git add keywords_state/
          git diff --staged --quiet || git commit -m "Update state [skip ci]"
          git push || echo "Rien a pousser ou conflit, on continue"
