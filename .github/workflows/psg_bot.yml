name: PSG Watch Party Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 -q

      - name: Check billetterie PSG Watch Party
        run: |
          python - <<'EOF'
          import smtplib, os, hashlib, json, re
          import requests
          from bs4 import BeautifulSoup
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart

          GMAIL = "nelson.baltimor.pro@gmail.com"
          PASSWORD = os.environ["GMAIL_APP_PASSWORD"]
          WORKER = "https://late-credit-b4e0.nelson-baltimor-pro.workers.dev/?url="

          HEADERS = {
            "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
            "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8",
            "Accept-Language": "fr-FR,fr;q=0.9,en;q=0.8",
            "Accept-Encoding": "gzip, deflate, br",
            "Connection": "keep-alive",
            "Upgrade-Insecure-Requests": "1",
            "Sec-Fetch-Dest": "document",
            "Sec-Fetch-Mode": "navigate",
            "Sec-Fetch-Site": "none",
            "Sec-Fetch-User": "?1",
          }

          def extraire_zone_offres(html):
            soup = BeautifulSoup(html, "html.parser")
            for tag in soup.find_all(["script", "style", "noscript", "iframe"]):
              tag.decompose()
            for tag in soup.find_all(attrs={"class": re.compile(r"nav|header|footer|menu|cookie|banner|social", re.I)}):
              tag.decompose()
            text = soup.get_text(separator="\n")
            lignes = text.split("\n")
            lignes_nettoyees = []
            capture = False
            stops = ["accueil", "nike", "qatar airways", "beyond", "visit qatar", "ooredoo", "copyright"]
            for ligne in lignes:
              l = ligne.strip()
              if not l:
                continue
              if not capture and re.search(r"billet|offre|vente|diffusion|hospitalit", l, re.I):
                capture = True
              if capture:
                if any(s in l.lower() for s in stops):
                  break
                lignes_nettoyees.append(l)
            return "\n".join(lignes_nettoyees)

          def nettoyer_texte_media(html):
            soup = BeautifulSoup(html, "html.parser")
            for tag in soup.find_all(["script", "style", "noscript"]):
              tag.decompose()
            return soup.get_text(separator=" ").lower()

          TARGETS_CATALOGUE = [
            {"name": "Billetterie PSG - Catalogue achat diffusion UCL",
             "url": WORKER + "https://billetterie.psg.fr/fr/catalogue/match-foot-masculin-diffusion-de-la-finale-ucl-2026"},
            {"name": "Billetterie PSG - Page offre retransmission",
             "url": WORKER + "https://billetterie.psg.fr/fr/offres/retransmission-ucl-final-2026"},
          ]

          KEYWORDS_BACKUP = [
            "vague 2","vague 3","myparis","my paris","grand public",
            "nouvelle vague","nouvelle phase","nouvelle offre",
            "visibilite reduite","visibilité réduite",
            "pmr","balcon","trophee","trophées",
            "billet disponible","billets disponibles",
            "disponible sur ticketplace","places disponibles sur ticketplace",
            "ouverture billetterie","billetterie ouverte",
            "mise en vente","vente ouverte",
          ]

          TARGETS_BACKUP = [
            {"name": "Billetterie PSG principale",
             "url": WORKER + "https://billetterie.psg.fr/fr/",
             "critical": True},
            {"name": "Billetterie PSG listing",
             "url": WORKER + "https://billetterie.psg.fr/fr/listing-events",
             "critical": True},
            {"name": "PSG.fr - Info billetterie diffusion finale",
             "url": "https://www.psg.fr/content/information-billetterie-pour-la-diffusion-de-la-finale-de-ligue-des-champions-psg-arsenal-ucl-parc-des-princes-viewing-party-20252026",
             "critical": True},
            {"name": "TicketPlace PSG",
             "url": WORKER + "https://ticketplace.psg.fr/fr/",
             "critical": True},
            {"name": "Qlic alerte officielle PSG",
             "url": "https://qlic.it/1796571",
             "critical": True},
            {"name": "Canal Supporters PSG",
             "url": "https://canal-supporters.com/category/psg-news/",
             "critical": False},
            {"name": "CulturePSG",
             "url": "https://www.culturepsg.com/bg/news/Places",
             "critical": False},
            {"name": "Le Parisien PSG",
             "url": "https://www.leparisien.fr/sports/football/psg/",
             "critical": False},
            {"name": "RMC Sport LDC",
             "url": "https://rmcsport.bfmtv.com/football/ligue-des-champions/",
             "critical": False},
          ]

          os.makedirs("keywords_state", exist_ok=True)

          def check_catalogue(html, t):
            state_filename = "keywords_state/" + hashlib.md5(t["url"].encode()).hexdigest() + ".json"
            zone_actuelle = extraire_zone_offres(html)
            hash_actuel = hashlib.md5(zone_actuelle.encode("utf-8")).hexdigest()
            state = {}
            if os.path.exists(state_filename):
              try:
                with open(state_filename, "r") as f:
                  state = json.load(f)
              except:
                state = {}
            hash_precedent = state.get("hash", "")
            zone_precedente = state.get("zone", "")
            premier_scan = not hash_precedent
            with open(state_filename, "w") as f:
              json.dump({"hash": hash_actuel, "zone": zone_actuelle}, f)
            if premier_scan:
              print(f"  Premier scan enregistre — {len(zone_actuelle)} chars")
              return []
            if hash_actuel != hash_precedent:
              lignes_avant = set(zone_precedente.split("\n"))
              lignes_apres = set(zone_actuelle.split("\n"))
              ajoutees = sorted([l for l in lignes_apres - lignes_avant if l.strip()])
              supprimees = sorted([l for l in lignes_avant - lignes_apres if l.strip()])
              return [{
                "zone_avant": zone_precedente,
                "zone_apres": zone_actuelle,
                "lignes_ajoutees": ajoutees,
                "lignes_supprimees": supprimees,
              }]
            return []

          def check_backup(html, t):
            state_filename = "keywords_state/" + hashlib.md5(t["url"].encode()).hexdigest() + ".json"
            text = nettoyer_texte_media(html)
            mots_actuels = sorted([k for k in KEYWORDS_BACKUP if k.lower() in text])
            state = {}
            if os.path.exists(state_filename):
              try:
                with open(state_filename, "r") as f:
                  state = json.load(f)
              except:
                state = {}
            mots_precedents = state.get("mots", [])
            with open(state_filename, "w") as f:
              json.dump({"mots": mots_actuels}, f)
            nouveaux = [m for m in mots_actuels if m not in mots_precedents]
            if nouveaux:
              return [{"nouveaux": nouveaux, "tous": mots_actuels}]
            return []

          alerts = []

          for t in TARGETS_CATALOGUE:
            try:
              r = requests.get(t["url"], headers=HEADERS, timeout=20, allow_redirects=True)
              print(f"Scan catalogue — {t['name']} — {len(r.text)} chars")
              results = check_catalogue(r.text, t)
              for res in results:
                alerts.append({"name": t["name"], "url": t["url"], "type": "CATALOGUE", "critical": True, **res})
                print(f"ALERTE CHANGEMENT — {t['name']}")
              if not results:
                print(f"OK — {t['name']} — pas de changement")
            except Exception as e:
              print(f"Erreur {t['name']}: {e}")

          for t in TARGETS_BACKUP:
            try:
              r = requests.get(t["url"], headers=HEADERS, timeout=20, allow_redirects=True)
              print(f"Scan backup — {t['name']} — {len(r.text)} chars")
              results = check_backup(r.text, t)
              for res in results:
                alerts.append({
                  "name": t["name"], "url": t["url"], "type": "BACKUP",
                  "critical": t.get("critical", False),
                  "nouveaux": res["nouveaux"], "tous": res["tous"],
                  "zone_avant": "", "zone_apres": "",
                  "lignes_ajoutees": res["nouveaux"], "lignes_supprimees": [],
                })
                print(f"ALERTE KEYWORD — {t['name']} — {res['nouveaux']}")
              if not results:
                print(f"OK — {t['name']} — pas de changement")
            except Exception as e:
              print(f"Erreur {t['name']}: {e}")

          if alerts:
            alerts.sort(key=lambda x: not x.get("critical", False))
            body = "BILLETTERIE PSG - CHANGEMENT DETECTE !\n\n"
            body += "=== LIENS DIRECTS ===\n"
            body += "PAGE ACHAT  : https://billetterie.psg.fr/fr/catalogue/match-foot-masculin-diffusion-de-la-finale-ucl-2026\n"
            body += "PAGE OFFRE  : https://billetterie.psg.fr/fr/offres/retransmission-ucl-final-2026\n"
            body += "BILLETTERIE : https://billetterie.psg.fr/fr/\n"
            body += "TICKETPLACE : https://ticketplace.psg.fr/fr/\n"
            body += "QLIC        : https://qlic.it/1796571\n\n"
            body += "=== DETAIL DES CHANGEMENTS ===\n\n"
            for a in alerts:
              prio = "[CRITIQUE] " if a.get("critical") else ""
              body += f"{'='*50}\n"
              body += f"{prio}SOURCE : {a['name']}\n"
              body += f"URL    : {a['url']}\n\n"
              if a["type"] == "CATALOGUE":
                if a.get("lignes_ajoutees"):
                  body += "NOUVELLES LIGNES APPARUES :\n"
                  for l in a["lignes_ajoutees"]:
                    body += f"  + {l}\n"
                  body += "\n"
                if a.get("lignes_supprimees"):
                  body += "LIGNES DISPARUES :\n"
                  for l in a["lignes_supprimees"]:
                    body += f"  - {l}\n"
                  body += "\n"
                body += "--- CONTENU AVANT ---\n"
                body += (a.get("zone_avant") or "(vide)")[:1500]
                body += "\n\n--- CONTENU APRES ---\n"
                body += (a.get("zone_apres") or "(vide)")[:1500]
                body += "\n\n"
              elif a["type"] == "BACKUP":
                body += "MOTS DETECTES :\n"
                for m in a.get("nouveaux", []):
                  body += f"  + {m}\n"
                if a.get("tous"):
                  body += "\nTOUS SIGNAUX ACTIFS :\n"
                  for m in a["tous"]:
                    body += f"  . {m}\n"
                body += "\n"
            has_catalogue = any(a["type"] == "CATALOGUE" for a in alerts)
            has_critical = any(a.get("critical") for a in alerts)
            if has_catalogue:
              subject = "PSG WATCH PARTY — CHANGEMENT PAGE CATALOGUE ! FONCE !"
            elif has_critical:
              subject = "PSG WATCH PARTY — SIGNAL CRITIQUE DETECTE !"
            else:
              subject = "PSG WATCH PARTY — Signal detecte"
            msg = MIMEMultipart()
            msg["From"] = GMAIL
            msg["To"] = GMAIL
            msg["Subject"] = subject
            msg.attach(MIMEText(body, "plain", "utf-8"))
            try:
              with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
                s.login(GMAIL, PASSWORD)
                s.send_message(msg)
              print("Email envoye !")
            except Exception as e:
              print(f"Erreur email : {e}")
          else:
            print("Aucun changement detecte.")
          EOF
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Commit state
        run: |
          git config user.name "psg-bot"
          git config user.email "bot@noreply.github.com"
          git add keywords_state/
          git diff --staged --quiet || git commit -m "Update state [skip ci]"
          git push || echo "Rien a pousser ou conflit, on continue"
