name: PSG Watch Party Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 -q

      - name: Check billetterie PSG Watch Party
        run: |
          python - <<'EOF'
          import smtplib, os, hashlib, json, re
          import requests
          from bs4 import BeautifulSoup
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart

          GMAIL = "nelson.baltimor.pro@gmail.com"
          PASSWORD = os.environ["GMAIL_APP_PASSWORD"]
          WORKER = "https://late-credit-b4e0.nelson-baltimor-pro.workers.dev/?url="

          HEADERS = {
            "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
            "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8",
            "Accept-Language": "fr-FR,fr;q=0.9,en;q=0.8",
            "Accept-Encoding": "gzip, deflate, br",
            "Connection": "keep-alive",
            "Upgrade-Insecure-Requests": "1",
            "Sec-Fetch-Dest": "document",
            "Sec-Fetch-Mode": "navigate",
            "Sec-Fetch-Site": "none",
            "Sec-Fetch-User": "?1",
          }

          SIGNAL_ACHAT = [
            "acheter mes billets",
            "ventes ouvertes pour",
            "vente ouverte pour",
            "la billetterie est ouverte",
            "la vente est ouverte",
            "les billets sont en vente",
            "les places sont en vente",
            "disponible a l'achat",
            "disponible à l'achat",
            "procurez-vous vos billets",
            "procurez vous vos billets",
            "reservez vos places",
            "réservez vos places",
            "commandez vos billets",
            "places disponibles",
            "stock disponible",
            "places mises en vente",
            "mise en vente",
            "billetterie ouverte",
            "vente ouverte",
          ]

          SIGNAL_PHASES = [
            "phase 1 ouverte","phase 2 ouverte","phase 3 ouverte",
            "phase 1 est ouverte","phase 2 est ouverte","phase 3 est ouverte",
            "ouverture de la phase 1","ouverture de la phase 2","ouverture de la phase 3",
            "vente phase 1 ouverte","vente phase 2 ouverte","vente phase 3 ouverte",
            "ouverture phase 1","ouverture phase 2","ouverture phase 3",
            "ouverture myparis","ouverture my paris",
            "ouverture myparis premium","ouverture my paris premium",
            "myparis ouverte","my paris ouverte",
            "myparis premium ouverte","my paris premium ouverte",
          ]

          SIGNAL_CATEGORIES = [
            "abonnes diffusion - vague 1",
            "abonnés diffusion - vague 1",
            "abonnes - vague 1",
            "abonnés - vague 1",
            "ventes ouvertes pour : abonnes diffusion",
            "ventes ouvertes pour : abonnés diffusion",
            "hospitalites diffusion",
            "hospitalités diffusion",
            "societes diffusion",
            "sociétés diffusion",
            "- vague 2",
            "abonnes diffusion - vague 2",
            "abonnés diffusion - vague 2",
            "abonnes - vague 2",
            "abonnés - vague 2",
            "abonnes historiques - vague 2",
            "abonnés historiques - vague 2",
            "ventes ouvertes pour : vague 2",
            "vente ouverte pour : vague 2",
            "ventes ouvertes pour : abonnes historiques",
            "ventes ouvertes pour : abonnés historiques",
            "ventes ouvertes pour : abonnes grand public",
            "ventes ouvertes pour : abonnés grand public",
            "ventes ouvertes pour : tribune",
            "ventes ouvertes pour : virage",
            "ventes ouvertes pour : club premier",
            "ventes ouvertes pour : le virage",
            "- vague 3",
            "abonnes diffusion - vague 3",
            "abonnés diffusion - vague 3",
            "abonnes - vague 3",
            "abonnés - vague 3",
            "ventes ouvertes pour : vague 3",
            "vente ouverte pour : vague 3",
            "ventes ouvertes pour : myparis",
            "ventes ouvertes pour : myparis premium",
            "ventes ouvertes pour : my paris",
            "ventes ouvertes pour : my paris premium",
            "vente ouverte pour : myparis",
            "vente ouverte pour : myparis premium",
            "vente ouverte pour : my paris",
            "vente ouverte pour : my paris premium",
            "ventes ouvertes pour : grand public",
            "vente ouverte pour : grand public",
            "ventes ouvertes pour : abonnes societes",
            "ventes ouvertes pour : abonnés sociétés",
            "ventes ouvertes pour : cse",
            "ventes ouvertes pour : hospitalites",
            "ventes ouvertes pour : hospitalités",
            "vente ouverte pour : hospitalites",
            "vente ouverte pour : hospitalités",
            "vente ouverte pour : cse",
          ]

          SIGNAL_PRIX = [
            "à partir de 9,00","a partir de 9,00",
            "à partir de 19,00","a partir de 19,00",
            "à partir de 20,00","a partir de 20,00",
            "à partir de 25,00","a partir de 25,00",
            "à partir de 30,00","a partir de 30,00",
            "à partir de 35,00","a partir de 35,00",
            "à partir de 40,00","a partir de 40,00",
            "à partir de 45,00","a partir de 45,00",
            "à partir de 50,00","a partir de 50,00",
          ]

          SIGNAL_TICKETPLACE = [
            "disponible sur ticketplace",
            "disponible via ticketplace",
            "revente officielle",
            "places disponibles sur ticketplace",
            "places sur ticketplace",
            "billet disponible",
            "billets disponibles",
          ]

          KEYWORDS_BILLETTERIE = (
            SIGNAL_ACHAT + SIGNAL_PHASES + SIGNAL_CATEGORIES + SIGNAL_PRIX
          )

          KEYWORDS_MEDIAS = [
            "billetterie watch party ouverte",
            "billetterie de la retransmission ouverte",
            "ouverture billetterie retransmission",
            "phase 1 ouverte","phase 2 ouverte","phase 3 ouverte",
            "mise en vente watch party",
            "watch party billetterie ouverte",
            "places retransmission disponibles",
            "ouverture de la phase",
            "myparis ouverte","my paris ouverte",
            "myparis premium ouverte","my paris premium ouverte",
            "ouverture myparis","ouverture my paris",
            "vague 2 ouverte","vague 3 ouverte",
            "nouvelle vague billetterie",
          ]

          ALWAYS_ALERT = [
            "acheter mes billets",
            "- vague 2",
            "abonnes - vague 2",
            "abonnés - vague 2",
            "abonnes diffusion - vague 2",
            "abonnés diffusion - vague 2",
            "abonnes historiques - vague 2",
            "abonnés historiques - vague 2",
            "ventes ouvertes pour : vague 2",
            "vente ouverte pour : vague 2",
            "ventes ouvertes pour : abonnes historiques",
            "ventes ouvertes pour : abonnés historiques",
            "ventes ouvertes pour : abonnes grand public",
            "ventes ouvertes pour : abonnés grand public",
            "- vague 3",
            "abonnes - vague 3",
            "abonnés - vague 3",
            "abonnes diffusion - vague 3",
            "abonnés diffusion - vague 3",
            "ventes ouvertes pour : vague 3",
            "vente ouverte pour : vague 3",
            "ventes ouvertes pour : myparis premium",
            "ventes ouvertes pour : myparis",
            "ventes ouvertes pour : my paris premium",
            "ventes ouvertes pour : my paris",
            "vente ouverte pour : myparis premium",
            "vente ouverte pour : myparis",
            "ventes ouvertes pour : grand public",
            "vente ouverte pour : grand public",
            "places disponibles sur ticketplace",
            "billet disponible",
            "billets disponibles",
          ]

          TARGETS = [
            {"name": "Billetterie PSG - Catalogue achat diffusion UCL",
             "url": WORKER + "https://billetterie.psg.fr/fr/catalogue/match-foot-masculin-diffusion-de-la-finale-ucl-2026",
             "keywords": KEYWORDS_BILLETTERIE,
             "critical": True,
             "always_alert": True,
             "watch_bloc": True},
            {"name": "Billetterie PSG - Page offre retransmission",
             "url": WORKER + "https://billetterie.psg.fr/fr/offres/retransmission-ucl-final-2026",
             "keywords": KEYWORDS_BILLETTERIE,
             "critical": True,
             "always_alert": True,
             "watch_bloc": True},
            {"name": "Billetterie PSG principale",
             "url": WORKER + "https://billetterie.psg.fr/fr/",
             "keywords": SIGNAL_ACHAT + SIGNAL_CATEGORIES + [
               "retransmission ucl final 2026",
               "diffusion-de-la-finale-ucl-2026",
               "watch party","viewing party","diffusion finale",
             ],
             "critical": True,
             "always_alert": True,
             "watch_bloc": False},
            {"name": "Billetterie PSG listing",
             "url": WORKER + "https://billetterie.psg.fr/fr/listing-events",
             "keywords": SIGNAL_ACHAT + SIGNAL_CATEGORIES + [
               "retransmission ucl final 2026",
               "diffusion-de-la-finale-ucl-2026",
               "watch party","viewing party","diffusion finale",
             ],
             "critical": True,
             "always_alert": False,
             "watch_bloc": False},
            {"name": "PSG.fr - Info billetterie diffusion finale",
             "url": "https://www.psg.fr/content/information-billetterie-pour-la-diffusion-de-la-finale-de-ligue-des-champions-psg-arsenal-ucl-parc-des-princes-viewing-party-20252026",
             "keywords": SIGNAL_PHASES + SIGNAL_ACHAT + SIGNAL_CATEGORIES + [
               "vague 2","vague 3","myparis premium",
               "billetterie est ouverte","vente lancee","vente lancée",
               "les billets sont disponibles","cliquez ici pour acheter",
               "nouvelle phase",
             ],
             "critical": True,
             "always_alert": False,
             "watch_bloc": False},
            {"name": "TicketPlace PSG - Revente diffusion",
             "url": WORKER + "https://ticketplace.psg.fr/fr/",
             "keywords": SIGNAL_TICKETPLACE + [
               "finale","diffusion","30 mai","parc des princes",
               "billet disponible","billets disponibles","places disponibles",
             ],
             "critical": True,
             "always_alert": True,
             "watch_bloc": False},
            {"name": "Qlic alerte officielle PSG",
             "url": "https://qlic.it/1796571",
             "keywords": SIGNAL_ACHAT + SIGNAL_PHASES + SIGNAL_CATEGORIES + [
               "disponible maintenant","nouvelle phase","nouvelle vague",
             ],
             "critical": True,
             "always_alert": False,
             "watch_bloc": False},
            {"name": "Canal Supporters PSG",
             "url": "https://canal-supporters.com/category/psg-news/",
             "keywords": KEYWORDS_MEDIAS,
             "critical": False,
             "always_alert": False,
             "watch_bloc": False},
            {"name": "CulturePSG",
             "url": "https://www.culturepsg.com/bg/news/Places",
             "keywords": KEYWORDS_MEDIAS,
             "critical": False,
             "always_alert": False,
             "watch_bloc": False},
            {"name": "Le Parisien PSG",
             "url": "https://www.leparisien.fr/sports/football/psg/",
             "keywords": KEYWORDS_MEDIAS,
             "critical": False,
             "always_alert": False,
             "watch_bloc": False},
            {"name": "RMC Sport LDC",
             "url": "https://rmcsport.bfmtv.com/football/ligue-des-champions/",
             "keywords": KEYWORDS_MEDIAS,
             "critical": False,
             "always_alert": False,
             "watch_bloc": False},
          ]

          os.makedirs("keywords_state", exist_ok=True)

          def extraire_bloc_ventes(text):
            patterns = [
              r"ventes? ouvertes? pour.{0,300}",
              r"abonnés?.{0,50}vague.{0,100}",
              r"abonnés? diffusion.{0,100}",
              r"hospitalités?.{0,100}",
            ]
            blocs = []
            for p in patterns:
              m = re.search(p, text, re.IGNORECASE)
              if m:
                blocs.append(m.group(0).strip())
            return " | ".join(blocs)

          def check_target(text, t):
            text_lower = text.lower()
            alerts_out = []
            mots_actuels = sorted([k for k in t["keywords"] if k.lower() in text_lower])
            state_filename = "keywords_state/" + hashlib.md5(t["url"].encode()).hexdigest() + ".json"

            state = {}
            if os.path.exists(state_filename):
              try:
                with open(state_filename, "r") as f:
                  data = json.load(f)
                  if isinstance(data, list):
                    state = {"mots": data, "bloc_ventes": ""}
                  else:
                    state = data
              except:
                state = {}

            mots_precedents = state.get("mots", [])
            bloc_precedent = state.get("bloc_ventes", "")

            bloc_actuel = ""
            changement_bloc = False
            if t.get("watch_bloc", False):
              bloc_actuel = extraire_bloc_ventes(text_lower)
              if bloc_actuel and bloc_precedent and bloc_actuel != bloc_precedent:
                changement_bloc = True

            nouveaux_mots = [m for m in mots_actuels if m not in mots_precedents]

            always_trouves = []
            if t.get("always_alert", False):
              always_trouves = [m for m in mots_actuels if m.lower() in [a.lower() for a in ALWAYS_ALERT]]

            with open(state_filename, "w") as f:
              json.dump({
                "mots": mots_actuels,
                "bloc_ventes": bloc_actuel if t.get("watch_bloc") else bloc_precedent
              }, f)

            if changement_bloc:
              alerts_out.append({
                "type": "CHANGEMENT BLOC VENTES — NOUVELLE VAGUE POSSIBLE !",
                "nouveaux": ["Le contenu du bloc ventes a change sur la page"],
                "tous": mots_actuels,
              })
            if nouveaux_mots:
              alerts_out.append({
                "type": "NOUVEAU MOT-CLE",
                "nouveaux": nouveaux_mots,
                "tous": mots_actuels,
              })
            elif not changement_bloc and always_trouves:
              alerts_out.append({
                "type": "VAGUE ACTIVE",
                "nouveaux": always_trouves,
                "tous": mots_actuels,
              })

            return alerts_out

          alerts = []

          for t in TARGETS:
            try:
              r = requests.get(t["url"], headers=HEADERS, timeout=20, allow_redirects=True)
              text = BeautifulSoup(r.text, "html.parser").get_text(separator=" ")
              print(f"Scan — {t['name']} — {len(text)} caracteres")
              results = check_target(text, t)
              for res in results:
                alerts.append({
                  "name": t["name"],
                  "url": t["url"],
                  "type": res["type"],
                  "nouveaux": res["nouveaux"],
                  "tous": res["tous"],
                  "critical": t.get("critical", False),
                })
                print(f"ALERTE {res['type']} — {t['name']} — {res['nouveaux']}")
              if not results:
                print(f"OK — {t['name']} — aucun nouveau signal")
            except Exception as e:
              print(f"Erreur {t['name']}: {e}")

          if alerts:
            alerts.sort(key=lambda x: not x.get("critical", False))

            body = "BILLETTERIE PSG - NOUVEAU SIGNAL !\n\n"
            body += "=== LIENS DIRECTS ===\n"
            body += "PAGE ACHAT  : https://billetterie.psg.fr/fr/catalogue/match-foot-masculin-diffusion-de-la-finale-ucl-2026\n"
            body += "PAGE OFFRE  : https://billetterie.psg.fr/fr/offres/retransmission-ucl-final-2026\n"
            body += "BILLETTERIE : https://billetterie.psg.fr/fr/\n"
            body += "TICKETPLACE : https://ticketplace.psg.fr/fr/\n"
            body += "QLIC        : https://qlic.it/1796571\n\n"
            body += "=== SIGNAUX DETECTES ===\n\n"

            for a in alerts:
              prio = "[CRITIQUE] " if a.get("critical") else ""
              body += f"{prio}Source : {a['name']}\n"
              body += f"Type   : {a['type']}\n"
              body += f"Signal : {', '.join(a['nouveaux'])}\n"
              if a["tous"]:
                body += f"Actifs : {', '.join(a['tous'])}\n"
              body += f"URL    : {a['url']}\n\n"

            has_critical = any(a.get("critical") for a in alerts)
            is_vague = any(
              "VAGUE" in a["type"] or "CHANGEMENT" in a["type"] or
              any(v in " ".join(a["nouveaux"]).lower() for v in ["vague 2","vague 3","myparis","grand public","ticketplace"])
              for a in alerts
            )

            if has_critical and is_vague:
              subject = "PSG WATCH PARTY — NOUVELLE VAGUE OUVERTE ! FONCE !"
            elif has_critical:
              subject = "PSG WATCH PARTY — BILLETTERIE OUVERTE ! FONCE !"
            else:
              subject = "PSG WATCH PARTY — Signal detecte"

            msg = MIMEMultipart()
            msg["From"] = GMAIL
            msg["To"] = GMAIL
            msg["Subject"] = subject
            msg.attach(MIMEText(body, "plain", "utf-8"))
            try:
              with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
                s.login(GMAIL, PASSWORD)
                s.send_message(msg)
              print("Email envoye !")
            except Exception as e:
              print(f"Erreur email : {e}")
          else:
            print("Aucun nouveau signal.")
          EOF
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Commit state
        run: |
          git config user.name "psg-bot"
          git config user.email "bot@noreply.github.com"
          git add keywords_state/
          git diff --staged --quiet || git commit -m "Update state [skip ci]"
          git push || echo "Rien a pousser ou conflit, on continue"
