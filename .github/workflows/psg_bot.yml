name: PSG Watch Party Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 -q

      - name: Check billetterie PSG Watch Party
        run: |
          python - <<'EOF'
          import smtplib, os, hashlib, json, re
          from datetime import datetime
          import requests
          from bs4 import BeautifulSoup
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart

          GMAIL = "nelson.baltimor.pro@gmail.com"
          PASSWORD = os.environ["GMAIL_APP_PASSWORD"]
          WORKER = "https://late-credit-b4e0.nelson-baltimor-pro.workers.dev/?url="

          HEADERS = {
            "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
            "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8",
            "Accept-Language": "fr-FR,fr;q=0.9,en;q=0.8",
            "Accept-Encoding": "gzip, deflate, br",
            "Connection": "keep-alive",
            "Upgrade-Insecure-Requests": "1",
          }

          TARGETS = [
            {"name": "Catalogue achat diffusion UCL",
             "url": WORKER + "https://billetterie.psg.fr/fr/catalogue/match-foot-masculin-diffusion-de-la-finale-ucl-2026",
             "type": "catalogue"},
            {"name": "TicketPlace PSG",
             "url": WORKER + "https://ticketplace.psg.fr/fr/",
             "type": "ticketplace"},
          ]

          os.makedirs("keywords_state", exist_ok=True)

          def extraire_zone_offres(html):
            soup = BeautifulSoup(html, "html.parser")
            for tag in soup.find_all(["script", "style", "noscript", "iframe"]):
              tag.decompose()
            for tag in soup.find_all(attrs={"class": re.compile(r"nav|header|footer|menu|cookie|banner|social", re.I)}):
              tag.decompose()
            text = soup.get_text(separator="\n")
            lignes = text.split("\n")
            lignes_nettoyees = []
            capture = False
            stops = ["accueil", "nike", "qatar airways", "beyond", "visit qatar", "ooredoo", "copyright"]
            for ligne in lignes:
              l = ligne.strip()
              if not l:
                continue
              if not capture and re.search(r"billet|offre|vente|diffusion|hospitalit", l, re.I):
                capture = True
              if capture:
                if any(s in l.lower() for s in stops):
                  break
                lignes_nettoyees.append(l)
            return "\n".join(lignes_nettoyees)

          def extraire_prix(zone):
            m = re.search(r"(\d+[,\.]\d+\s*€)", zone)
            return m.group(1).strip() if m else "inconnu"

          def extraire_categories(zone):
            # Extrait les lignes entre "Ventes ouvertes pour" et le bouton acheter
            m = re.search(r"ventes?\s+ouvertes?\s+pour\s*:?\s*(.*?)(?:acheter|voir toutes)", zone, re.IGNORECASE | re.DOTALL)
            if not m:
              return []
            bloc = m.group(1)
            lignes = [l.strip() for l in bloc.split("\n") if l.strip() and len(l.strip()) > 2]
            return lignes

          def check_page(html, t):
            state_filename = "keywords_state/" + hashlib.md5(t["url"].encode()).hexdigest() + ".json"
            zone_actuelle = extraire_zone_offres(html)
            hash_actuel = hashlib.md5(zone_actuelle.encode("utf-8")).hexdigest()

            state = {}
            if os.path.exists(state_filename):
              try:
                with open(state_filename, "r") as f:
                  state = json.load(f)
              except:
                state = {}

            hash_precedent = state.get("hash", "")
            zone_precedente = state.get("zone", "")
            premier_scan = not hash_precedent

            with open(state_filename, "w") as f:
              json.dump({"hash": hash_actuel, "zone": zone_actuelle}, f)

            if premier_scan:
              print(f"  Premier scan enregistre — {len(zone_actuelle)} chars")
              return None

            if hash_actuel != hash_precedent:
              lignes_avant = [l for l in zone_precedente.split("\n") if l.strip()]
              lignes_apres = [l for l in zone_actuelle.split("\n") if l.strip()]
              set_avant = set(lignes_avant)
              set_apres = set(lignes_apres)
              ajoutees = sorted([l for l in set_apres - set_avant])
              supprimees = sorted([l for l in set_avant - set_apres])
              cats_avant = extraire_categories(zone_precedente)
              cats_apres = extraire_categories(zone_actuelle)
              prix_avant = extraire_prix(zone_precedente)
              prix_apres = extraire_prix(zone_actuelle)
              return {
                "zone_avant": zone_precedente,
                "zone_apres": zone_actuelle,
                "lignes_ajoutees": ajoutees,
                "lignes_supprimees": supprimees,
                "cats_avant": cats_avant,
                "cats_apres": cats_apres,
                "prix_avant": prix_avant,
                "prix_apres": prix_apres,
              }
            return None

          alerts = []
          heure = datetime.utcnow().strftime("%d/%m/%Y %H:%M UTC")

          for t in TARGETS:
            try:
              r = requests.get(t["url"], headers=HEADERS, timeout=20, allow_redirects=True)
              print(f"Scan — {t['name']} — {len(r.text)} chars")
              result = check_page(r.text, t)
              if result:
                alerts.append({"target": t, "result": result})
                print(f"ALERTE — {t['name']}")
              else:
                print(f"OK — {t['name']} — pas de changement")
            except Exception as e:
              print(f"Erreur {t['name']}: {e}")

          if alerts:
            for a in alerts:
              t = a["target"]
              res = a["result"]

              cats_avant = res["cats_avant"]
              cats_apres = res["cats_apres"]
              ajoutees = res["lignes_ajoutees"]
              supprimees = res["lignes_supprimees"]
              prix_avant = res["prix_avant"]
              prix_apres = res["prix_apres"]
              prix_change = prix_avant != prix_apres

              nouvelles_cats = [c for c in cats_apres if c not in cats_avant]
              cats_disparues = [c for c in cats_avant if c not in cats_apres]

              # Sujet email
              if nouvelles_cats:
                subject = "PSG WATCH PARTY — NOUVELLE VAGUE OUVERTE ! FONCE !"
              elif prix_change:
                subject = "PSG WATCH PARTY — CHANGEMENT DE PRIX !"
              else:
                subject = "PSG WATCH PARTY — CHANGEMENT DETECTE SUR LA PAGE !"

              # Corps du mail
              body = ""
              body += "=" * 50 + "\n"
              body += "  PSG WATCH PARTY — CHANGEMENT DETECTE\n"
              body += "=" * 50 + "\n\n"
              body += f"HEURE     : {heure}\n"
              body += f"PAGE      : {t['name']}\n"
              body += f"URL ACHAT : https://billetterie.psg.fr/fr/catalogue/match-foot-masculin-diffusion-de-la-finale-ucl-2026\n"
              body += f"TICKETPLACE : https://ticketplace.psg.fr/fr/\n\n"

              # Résumé principal
              body += "-" * 50 + "\n"
              body += "  RESUME DU CHANGEMENT\n"
              body += "-" * 50 + "\n\n"

              if nouvelles_cats:
                body += "NOUVELLES CATEGORIES OUVERTES :\n"
                for c in nouvelles_cats:
                  body += f"  >>> {c} <<<\n"
                body += "\n"

              if cats_disparues:
                body += "CATEGORIES FERMEES :\n"
                for c in cats_disparues:
                  body += f"  --- {c}\n"
                body += "\n"

              if prix_change:
                body += f"CHANGEMENT DE PRIX : {prix_avant} -> {prix_apres}\n\n"
              else:
                body += f"PRIX : {prix_apres} (inchange)\n\n"

              # Ventes ouvertes avant / après
              if cats_avant or cats_apres:
                body += "-" * 50 + "\n"
                body += "  VENTES OUVERTES POUR\n"
                body += "-" * 50 + "\n\n"
                body += "AVANT :\n"
                if cats_avant:
                  for c in cats_avant:
                    body += f"  • {c}\n"
                else:
                  body += "  (aucune)\n"
                body += "\nAPRES :\n"
                if cats_apres:
                  for c in cats_apres:
                    body += f"  • {c}\n"
                else:
                  body += "  (aucune)\n"
                body += "\n"

              # Toutes les lignes ajoutées / supprimées
              if ajoutees or supprimees:
                body += "-" * 50 + "\n"
                body += "  TOUTES LES MODIFICATIONS\n"
                body += "-" * 50 + "\n\n"
                if ajoutees:
                  body += "LIGNES APPARUES :\n"
                  for l in ajoutees:
                    body += f"  + {l}\n"
                  body += "\n"
                if supprimees:
                  body += "LIGNES DISPARUES :\n"
                  for l in supprimees:
                    body += f"  - {l}\n"
                  body += "\n"

              # Contenu complet avant / après
              body += "-" * 50 + "\n"
              body += "  CONTENU COMPLET\n"
              body += "-" * 50 + "\n\n"
              body += "--- AVANT ---\n"
              body += (res["zone_avant"] or "(vide)")[:2000]
              body += "\n\n--- APRES ---\n"
              body += (res["zone_apres"] or "(vide)")[:2000]
              body += "\n"

              msg = MIMEMultipart()
              msg["From"] = GMAIL
              msg["To"] = GMAIL
              msg["Subject"] = subject
              msg.attach(MIMEText(body, "plain", "utf-8"))
              try:
                with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
                  s.login(GMAIL, PASSWORD)
                  s.send_message(msg)
                print(f"Email envoye — {subject}")
              except Exception as e:
                print(f"Erreur email : {e}")
          else:
            print("Aucun changement detecte.")
          EOF
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Commit state
        run: |
          git config user.name "psg-bot"
          git config user.email "bot@noreply.github.com"
          git add keywords_state/
          git diff --staged --quiet || git commit -m "Update state [skip ci]"
          git push || echo "Rien a pousser ou conflit, on continue"
